<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpsManager 运维发布平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="font-sans antialiased min-h-screen bg-slate-50" x-data="loginForm()">

<div class="flex min-h-screen">
    <!-- 左侧品牌区 (大屏) -->
    <div class="hidden lg:flex lg:w-1/2 relative items-center justify-center bg-gradient-to-br from-blue-600 via-purple-600 to-indigo-800 overflow-hidden">
        <!-- 装饰圆 -->
        <div class="absolute -top-40 -left-40 w-96 h-96 bg-white rounded-full blur-3xl opacity-10"></div>
        <div class="absolute -bottom-40 -right-40 w-80 h-80 bg-white rounded-full blur-3xl opacity-10"></div>
        <div class="absolute top-1/3 right-1/4 w-48 h-48 bg-blue-400 rounded-full blur-3xl opacity-10"></div>

        <div class="relative z-10 px-12 max-w-lg">
            <!-- Logo -->
            <div class="w-20 h-20 bg-white/20 backdrop-blur rounded-2xl flex items-center justify-center shadow-lg mb-8 mx-auto">
                <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8-4"/>
                </svg>
            </div>
            <h1 class="text-4xl font-bold text-white text-center mb-2">OpsManager</h1>
            <p class="text-blue-200 text-lg text-center mb-12">运维发布管理平台</p>

            <!-- 统计指标 -->
            <div class="grid grid-cols-3 gap-6 text-center">
                <div>
                    <p class="text-3xl font-bold text-white">47+</p>
                    <p class="text-blue-200 text-sm mt-1">管理节点</p>
                </div>
                <div>
                    <p class="text-3xl font-bold text-white">5</p>
                    <p class="text-blue-200 text-sm mt-1">功能模块</p>
                </div>
                <div>
                    <p class="text-3xl font-bold text-white">99.9%</p>
                    <p class="text-blue-200 text-sm mt-1">可用率</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 右侧表单区 -->
    <div class="flex-1 flex items-center justify-center p-6">
        <div class="w-full max-w-sm">
            <!-- 移动端 Logo -->
            <div class="lg:hidden text-center mb-8">
                <div class="w-16 h-16 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-200 mx-auto mb-4">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8-4"/>
                    </svg>
                </div>
                <h1 class="text-2xl font-bold text-slate-800">OpsManager</h1>
                <p class="text-sm text-slate-400 mt-1">运维发布管理平台</p>
            </div>

            <!-- 表单卡片 -->
            <div class="bg-white rounded-xl shadow-sm border border-slate-100 p-8">
                <h2 class="text-lg font-semibold text-slate-800 mb-1">欢迎回来</h2>
                <p class="text-sm text-slate-400 mb-6">请登录您的账号</p>

                <!-- 错误提示 -->
                <div x-show="error" x-cloak
                     class="flex items-center gap-2 px-4 py-3 mb-4 text-sm text-red-600 bg-red-50 border border-red-200 rounded-lg">
                    <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                    <span x-text="error"></span>
                </div>

                <form @submit.prevent="submitLogin()" class="space-y-4">
                    <div>
                        <label class="block text-xs font-medium text-slate-600 mb-1.5">用户名</label>
                        <input type="text" x-model="username" placeholder="请输入用户名" required
                               class="w-full h-11 px-3 text-sm rounded-lg border border-slate-200 bg-slate-50 outline-none focus:bg-white focus:border-blue-400 focus:ring-2 focus:ring-blue-100 transition-all">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-slate-600 mb-1.5">密码</label>
                        <input type="password" x-model="password" placeholder="请输入密码" required
                               class="w-full h-11 px-3 text-sm rounded-lg border border-slate-200 bg-slate-50 outline-none focus:bg-white focus:border-blue-400 focus:ring-2 focus:ring-blue-100 transition-all">
                    </div>
                    <button type="submit" :disabled="loading"
                            class="w-full h-11 bg-blue-500 hover:bg-blue-600 disabled:opacity-60 text-white font-semibold rounded-lg shadow-sm shadow-blue-200 transition-all flex items-center justify-center gap-2">
                        <svg x-show="loading" class="w-4 h-4 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                        </svg>
                        <span x-text="loading ? '登录中...' : '登 录'"></span>
                    </button>
                </form>
            </div>

            <p class="text-center text-slate-400 text-xs mt-6">OpsManager v2.0</p>
        </div>
    </div>
</div>

<script>
    function loginForm() {
        return {
            username: '',
            password: '',
            error: '',
            loading: false,
            submitLogin() {
                this.error = '';
                if (!this.username || !this.password) {
                    this.error = '请输入用户名和密码';
                    return;
                }
                this.loading = true;
                fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: this.username, password: this.password })
                })
                .then(r => r.json())
                .then(data => {
                    if (data.success) {
                        window.location.href = '/';
                    } else {
                        this.error = data.message || '登录失败';
                    }
                })
                .catch(() => {
                    this.error = '网络错误，请重试';
                })
                .finally(() => {
                    this.loading = false;
                });
            }
        }
    }
</script>

</body>
</html>
